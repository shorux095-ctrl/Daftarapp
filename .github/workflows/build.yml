name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Memory boost
        run: |
          sed -i 's/-Xmx768m/-Xmx4g/' gradle.properties || true
          sed -i 's/-Xmx512m/-Xmx2g/' gradle.properties || true
          sed -i 's/org.gradle.daemon=true/org.gradle.daemon=false/' gradle.properties || true

      - name: Build APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DaftarApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
